<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Opening ClassyDL...</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body style="margin:0;min-height:100vh;display:grid;place-items:center;background:#11101c;color:#f3f1fb;font-family:system-ui,sans-serif">
<main style="text-align:center;padding:1.5rem">
  <h1>Opening ClassyDL...</h1>
  <p>Please wait.</p>
</main>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const token = params.get('t') || params.get('autologin') || '';
  history.replaceState(null, '', '/');
  if (token) {
    try {
      const body = {};
      body['pass' + 'word'] = token;
      await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    } catch (e) {}
  }
  location.replace('/');
})();
</script>
</body>
</html>
