<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>ClassyDL</title>
<meta name="theme-color" content="#0b0710" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0710;
    --bg-panel: #14101c;
    --bg-panel-2: #1c1524;
    --border: #3a2a4a;
    --gold: #b89150;
    --gold-bright: #d9b968;
    --blood: #7a1530;
    --text: #d8cfe0;
    --text-dim: #93889f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(ellipse at top, #1a1223 0%, #0b0710 60%),
      var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    min-height: 100vh;
    padding-bottom: 3rem;
  }
  h1, h2, h3 { font-family: 'Cinzel Decorative', 'EB Garamond', serif; color: var(--gold-bright); font-weight: 700; }
  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.9rem; margin: 0 0 0.25rem; letter-spacing: 0.05em; text-shadow: 0 0 12px rgba(184,145,80,0.35); }
  header p { color: var(--text-dim); margin: 0; font-style: italic; }
  main { max-width: 720px; margin: 0 auto; padding: 1.25rem; }
  .card {
    background: linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  .card h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
  label { display: block; margin: 0.75rem 0 0.3rem; color: var(--text-dim); font-size: 0.95rem; }
  input[type=text], input[type=password], input[type=url] {
    width: 100%;
    padding: 0.65rem 0.75rem;
    background: #0e0a15;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-family: inherit;
    font-size: 1rem;
  }
  input:focus { outline: none; border-color: var(--gold); }
  button {
    font-family: 'Cinzel Decorative', serif;
    background: linear-gradient(180deg, var(--blood), #4a0d1e);
    color: #f2e6d0;
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 0.6rem 1.1rem;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    margin-top: 0.85rem;
    margin-right: 0.5rem;
  }
  button:active { transform: translateY(1px); }
  button.secondary { background: linear-gradient(180deg, #2a2035, #1c1524); }
  button:disabled { opacity: 0.5; cursor: default; }
  .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
  .checkbox-row { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.6rem; color: var(--text-dim); font-size: 0.9rem; }
  ul.media-list, ul.job-list { list-style: none; padding: 0; margin: 0.75rem 0 0; }
  ul.media-list li, ul.job-list li {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.75rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: rgba(0,0,0,0.2);
    font-size: 0.92rem;
    word-break: break-all;
  }
  .tag {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
    flex-shrink: 0;
  }
  .job-status { font-size: 0.75rem; padding: 0.1rem 0.5rem; border-radius: 10px; flex-shrink: 0; }
  .status-pending, .status-in_progress { background: #4a3a10; color: #f0d78a; }
  .status-completed { background: #1e4a2a; color: #9be0a8; }
  .status-failed, .status-cancelled { background: #4a1520; color: #f0a0ac; }
  .item-name { flex: 1; }
  .muted { color: var(--text-dim); font-size: 0.85rem; }
  a.dl-link { color: var(--gold-bright); text-decoration: none; border-bottom: 1px dotted var(--gold); }
  #login-overlay {
    position: fixed; inset: 0; background: rgba(6,4,10,0.92);
    display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem;
  }
  #login-overlay .card { max-width: 340px; width: 100%; }
  #toast {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    background: #2a0d16; border: 1px solid var(--blood); color: #f2d0d0;
    padding: 0.6rem 1rem; border-radius: 6px; font-size: 0.9rem; max-width: 90vw;
    display: none; z-index: 60;
  }
  .hidden { display: none !important; }
  footer { text-align: center; color: var(--text-dim); font-size: 0.8rem; padding: 1.5rem 1rem; }
</style>
</head>
<body>

<div id="login-overlay">
  <div class="card">
    <h2>Enter the Crypt</h2>
    <label for="login-password">Password</label>
    <input type="password" id="login-password" autocomplete="current-password" />
    <div class="row"><button id="login-btn">Unlock</button></div>
    <p class="muted" id="login-error"></p>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h1>&#10013; ClassyDL &#10013;</h1>
    <p>Summon media from any page, from any device</p>
  </header>
  <main>
    <div class="card">
      <h2>Scrape a Page</h2>
      <label for="scrape-url">Page URL</label>
      <input type="url" id="scrape-url" placeholder="https://example.com/gallery" />
      <div class="checkbox-row"><input type="checkbox" id="scrape-deep" /><label for="scrape-deep" style="margin:0">Deep scrape (follow links)</label></div>
      <div class="row">
        <button id="scrape-btn">Scrape</button>
        <button class="secondary" id="direct-queue-btn">Video downloaden</button>
        <button class="secondary" id="direct-audio-btn">Audio downloaden</button>
      </div>
      <ul class="media-list" id="media-list"></ul>
      <div class="row hidden" id="scrape-actions">
        <button id="queue-selected-btn">Queue Selected</button>
        <button class="secondary" id="select-all-btn">Select All</button>
      </div>
    </div>

    <div class="card">
      <h2>Queue</h2>
      <p class="muted">Refreshes automatically every few seconds.</p>
      <ul class="job-list" id="job-list"></ul>
    </div>
  </main>
  <footer>ClassyDL &mdash; download only media you have the right to access.</footer>
</div>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let lastScrape = null;

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.style.display = 'none'; }, 4000);
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
    credentials: 'same-origin',
  });
  if (res.status === 401) throw { unauthorized: true };
  let data = null;
  try { data = await res.json(); } catch (e) { /* no body */ }
  if (!res.ok) throw { message: (data && data.detail) || res.statusText };
  return data;
}

async function checkAuth() {
  try {
    const me = await api('/api/me');
    setAuthed(me.authenticated);
  } catch (e) { setAuthed(false); }
}

function setAuthed(authed) {
  $('login-overlay').classList.toggle('hidden', authed);
  $('app').classList.toggle('hidden', !authed);
  if (authed) { refreshQueue(); }
}

$('login-btn').addEventListener('click', async () => {
  const password = $('login-password').value;
  $('login-error').textContent = '';
  try {
    await api('/api/login', { method: 'POST', body: { password } });
    $('login-password').value = '';
    setAuthed(true);
  } catch (e) {
    $('login-error').textContent = 'Wrong password.';
  }
});
$('login-password').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('login-btn').click(); });

function renderMedia(result) {
  lastScrape = result;
  const list = $('media-list');
  list.innerHTML = '';
  if (!result.items.length) {
    list.innerHTML = '<li class="muted">No media found on this page.</li>';
    $('scrape-actions').classList.add('hidden');
    return;
  }
  result.items.forEach((item, idx) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <input type="checkbox" class="media-pick" data-idx="${idx}" />
      <span class="tag">${item.media_type}</span>
      <span class="item-name">${item.filename}</span>
    `;
    list.appendChild(li);
  });
  $('scrape-actions').classList.remove('hidden');
}

$('scrape-btn').addEventListener('click', async () => {
  const url = $('scrape-url').value.trim();
  if (!url) return toast('Enter a URL first.');
  $('scrape-btn').disabled = true;
  try {
    const result = await api('/api/scrape', { method: 'POST', body: { url, deep: $('scrape-deep').checked } });
    renderMedia(result);
    if (result.errors && result.errors.length) toast(result.errors[0]);
  } catch (e) {
    toast(e.message || 'Scrape failed.');
  } finally {
    $('scrape-btn').disabled = false;
  }
});

async function queueSource(source, audioOnly) {
  await api('/api/queue', { method: 'POST', body: { source, audio_only: !!audioOnly } });
  toast('Queued.');
  refreshQueue();
}

$('direct-queue-btn').addEventListener('click', () => {
  const url = $('scrape-url').value.trim();
  if (!url) return toast('Enter a URL first.');
  queueSource(url, false).catch((e) => toast(e.message || 'Failed to queue.'));
});

$('direct-audio-btn').addEventListener('click', () => {
  const url = $('scrape-url').value.trim();
  if (!url) return toast('Enter a URL first.');
  queueSource(url, true).catch((e) => toast(e.message || 'Failed to queue.'));
});

$('select-all-btn').addEventListener('click', () => {
  document.querySelectorAll('.media-pick').forEach((cb) => { cb.checked = true; });
});

$('queue-selected-btn').addEventListener('click', async () => {
  if (!lastScrape) return;
  const picked = Array.from(document.querySelectorAll('.media-pick:checked')).map((cb) => lastScrape.items[Number(cb.dataset.idx)]);
  if (!picked.length) return toast('Select at least one item.');
  try {
    for (const item of picked) {
      await queueSource(item.url, false);
    }
  } catch (e) {
    toast(e.message || 'Failed to queue selection.');
  }
});

function jobRow(job) {
  const li = document.createElement('li');
  const files = (job.files || []).map((f) => `<a class="dl-link" href="${f.download_url}">${f.filename}</a>`).join(' &middot; ');
  li.innerHTML = `
    <span class="job-status status-${job.status}">${job.status}</span>
    <span class="item-name">${job.source}${job.error ? `<br/><span class="muted">${job.error}</span>` : ''}${files ? `<br/>${files}` : ''}</span>
  `;
  if (job.status === 'pending' || job.status === 'in_progress') {
    const btn = document.createElement('button');
    btn.className = 'secondary';
    btn.textContent = 'Cancel';
    btn.style.marginTop = '0';
    btn.addEventListener('click', async () => {
      try { await api(`/api/queue/${job.id}/cancel`, { method: 'POST' }); refreshQueue(); }
      catch (e) { toast(e.message || 'Failed to cancel.'); }
    });
    li.appendChild(btn);
  }
  return li;
}

async function refreshQueue() {
  try {
    const data = await api('/api/queue');
    const list = $('job-list');
    list.innerHTML = '';
    if (!data.jobs.length) {
      list.innerHTML = '<li class="muted">Nothing queued yet.</li>';
      return;
    }
    data.jobs.forEach((job) => list.appendChild(jobRow(job)));
  } catch (e) {
    if (e.unauthorized) setAuthed(false);
  }
}

setInterval(() => { if (!$('app').classList.contains('hidden')) refreshQueue(); }, 4000);
checkAuth();
</script>
</body>
</html>
