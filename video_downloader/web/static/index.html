<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>DownloadThat</title>
<meta name="theme-color" content="#0e0c14" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0c14;
    --bg-panel: #17141f;
    --border: #2c2836;
    --accent: #c9a869;
    --accent-dim: #8a7550;
    --text: #e4e0ea;
    --text-dim: #948da3;
    --danger: #c96a6a;
    --ok: #7fbf8f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.45;
    min-height: 100vh;
    padding-bottom: 3rem;
  }
  h1, h2 { font-weight: 600; margin: 0; }
  h2 { font-size: 1.05rem; color: var(--text); letter-spacing: 0.02em; }
  header {
    text-align: center;
    padding: 1.75rem 1rem 1.25rem;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  header p { color: var(--text-dim); margin: 0.35rem 0 0; font-size: 0.9rem; }
  main { max-width: 640px; margin: 0 auto; padding: 0 1rem; }
  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.2rem 1.3rem;
    margin-bottom: 1rem;
  }
  .card h2 { padding-bottom: 0.6rem; margin-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
  label { display: block; margin: 0.7rem 0 0.3rem; color: var(--text-dim); font-size: 0.85rem; }
  input[type=text], input[type=password], input[type=url] {
    width: 100%;
    padding: 0.6rem 0.7rem;
    background: #0b0a10;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
  }
  input:focus { outline: none; border-color: var(--accent-dim); }
  button {
    font-family: inherit;
    font-size: 0.9rem;
    border-radius: 8px;
    padding: 0.55rem 1rem;
    cursor: pointer;
    border: 1px solid transparent;
  }
  button.primary {
    background: var(--accent);
    color: #14121a;
    font-weight: 600;
  }
  button.primary:hover { background: #d8ba85; }
  button.secondary {
    background: transparent;
    border-color: var(--border);
    color: var(--text);
  }
  button.secondary:hover { border-color: var(--accent-dim); }
  button.ghost {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 0.35rem 0.55rem;
    font-size: 0.82rem;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  button.ghost:hover { color: var(--accent); }
  button:disabled { opacity: 0.45; cursor: default; }
  .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 0.85rem; }
  .checkbox-row { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.6rem; color: var(--text-dim); font-size: 0.88rem; }

  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .results-bar .actions { display: flex; gap: 0.25rem; }

  ul.media-list {
    list-style: none;
    padding: 0;
    margin: 0.5rem 0 0;
    max-height: 320px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  ul.media-list li {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.5rem 0.65rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  ul.media-list li:last-child { border-bottom: none; }
  ul.media-list li:hover { background: rgba(255,255,255,0.03); }
  ul.media-list li.empty { color: var(--text-dim); justify-content: center; padding: 1rem; }

  ul.job-list { list-style: none; padding: 0; margin: 0.5rem 0 0; }
  ul.job-list li {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    margin-bottom: 0.5rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.9rem;
  }

  .tag {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    padding: 0.05rem 0.35rem;
    flex-shrink: 0;
  }
  .job-status { font-size: 0.72rem; padding: 0.1rem 0.5rem; border-radius: 10px; flex-shrink: 0; }
  .status-pending, .status-in_progress { background: #4a3a10; color: #f0d78a; }
  .status-completed { background: #1e3a26; color: var(--ok); }
  .status-failed, .status-cancelled { background: #3a1e22; color: var(--danger); }

  .item-name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .progress-track {
    flex-basis: 100%;
    height: 8px;
    background: #f1ede4;
    border-radius: 4px;
    overflow: hidden;
    margin-top: 0.35rem;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #8fe28f, #2e9e4f);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .progress-label {
    flex-basis: 100%;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 0.15rem;
  }
  .muted { color: var(--text-dim); font-size: 0.85rem; }
  a.dl-link { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent-dim); }

  #login-overlay {
    position: fixed; inset: 0; background: rgba(6,5,10,0.94);
    display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem;
  }
  #login-overlay .card { max-width: 320px; width: 100%; }
  #toast {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    background: #241820; border: 1px solid var(--danger); color: #f2d5d5;
    padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.88rem; max-width: 90vw;
    display: none; z-index: 60;
  }
  .hidden { display: none !important; }
  footer { text-align: center; color: var(--text-dim); font-size: 0.78rem; padding: 1.5rem 1rem; }

  #splash {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.9rem; z-index: 100;
    transition: opacity 0.4s ease;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  .splash-icon { animation: splash-bounce 1s ease-in-out infinite; }
  @keyframes splash-bounce {
    0%, 100% { transform: translateY(-6px); opacity: 0.7; }
    50% { transform: translateY(6px); opacity: 1; }
  }
  .splash-title {
    font-family: 'Cinzel', serif;
    color: var(--accent);
    font-size: 1.3rem;
    letter-spacing: 0.08em;
    opacity: 0;
    animation: splash-text-in 0.6s ease forwards 0.3s;
  }
  @keyframes splash-text-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="splash">
  <svg class="splash-icon" viewBox="0 0 64 64" width="56" height="56" aria-hidden="true">
    <path d="M32 6 L32 34 M20 24 L32 38 L44 24" stroke="#c9a869" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="14" y="46" width="36" height="6" rx="3" fill="#c9a869" />
  </svg>
  <div class="splash-title">DownloadThat</div>
</div>

<div id="login-overlay">
  <div class="card">
    <h2>Anmelden</h2>
    <label for="login-password">Passwort</label>
    <input type="password" id="login-password" autocomplete="current-password" />
    <div class="row"><button class="primary" id="login-btn">Entsperren</button></div>
    <p class="muted" id="login-error"></p>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h1>DownloadThat</h1>
    <p>Medien von jeder Seite herunterladen, von jedem Gerät aus</p>
  </header>
  <main>
    <div class="card hidden" id="license-card">
      <h2>Lizenz</h2>
      <p class="muted" id="license-status">—</p>
      <div class="row">
        <input type="text" id="license-key-input" placeholder="DLT-XXXXXXXX-XXXXXXXX-XXXXXXXX" />
        <button class="secondary" id="license-save-btn">Speichern</button>
      </div>
    </div>

    <div class="card">
      <h2>Seite durchsuchen</h2>
      <label for="scrape-url">Seiten-URL</label>
      <input type="url" id="scrape-url" placeholder="https://example.com/galerie" />
      <div class="checkbox-row"><input type="checkbox" id="scrape-deep" /><label for="scrape-deep" style="margin:0">Tief durchsuchen (Links folgen)</label></div>
      <div class="row">
        <button class="primary" id="direct-queue-btn">Video downloaden</button>
        <button class="secondary" id="direct-audio-btn">Audio downloaden</button>
        <button class="secondary" id="scrape-btn">Seite durchsuchen</button>
      </div>

      <div id="scrape-results" class="hidden">
        <div class="results-bar">
          <span class="muted" id="results-count"></span>
          <div class="actions">
            <button class="ghost" id="select-all-btn">Alle auswählen</button>
            <button class="ghost" id="deselect-all-btn">Auswahl aufheben</button>
            <button class="ghost" id="clear-results-btn">Liste leeren</button>
          </div>
        </div>
        <ul class="media-list" id="media-list"></ul>
        <div class="row">
          <button class="primary" id="queue-selected-btn">Ausgewählte herunterladen</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Warteschlange</h2>
      <p class="muted">Aktualisiert sich automatisch.</p>
      <ul class="job-list" id="job-list"></ul>
    </div>
  </main>
  <footer>DownloadThat &mdash; lade nur Medien herunter, an denen du Rechte hast.</footer>
</div>

<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
let lastScrape = null;

function playDownloadChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    [523.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.15);
      gain.gain.linearRampToValueAtTime(0.2, now + i * 0.15 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.35);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + i * 0.15);
      osc.stop(now + i * 0.15 + 0.4);
    });
  } catch (e) {
    // Autoplay blocked or Web Audio unsupported — the visual splash still plays.
  }
}

playDownloadChime();
setTimeout(() => {
  const splash = $('splash');
  splash.classList.add('fade-out');
  setTimeout(() => splash.remove(), 500);
}, 1600);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.style.display = 'none'; }, 4000);
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
    credentials: 'same-origin',
  });
  if (res.status === 401) throw { unauthorized: true };
  let data = null;
  try { data = await res.json(); } catch (e) { /* no body */ }
  if (!res.ok) throw { message: (data && data.detail) || res.statusText };
  return data;
}

async function checkAuth() {
  try {
    const me = await api('/api/me');
    setAuthed(me.authenticated);
  } catch (e) { setAuthed(false); }
}

function setAuthed(authed) {
  $('login-overlay').classList.toggle('hidden', authed);
  $('app').classList.toggle('hidden', !authed);
  if (authed) { refreshQueue(); refreshLicense(); }
}

async function refreshLicense() {
  try {
    const status = await api('/api/license');
    if (!status.configured) {
      // Termux/desktop: licensing isn't enforced there, so there's nothing
      // to show — the card stays hidden (its default state).
      return;
    }
    $('license-card').classList.remove('hidden');
    if (status.valid) {
      $('license-status').textContent = `Pro aktiv (${status.tier || 'unbekannt'}). Danke für deine Unterstützung!`;
    } else if (status.has_key) {
      $('license-status').textContent = 'Kostenlos — der hinterlegte Schlüssel ist ungültig oder abgelaufen.';
    } else {
      $('license-status').textContent = 'Kostenlos — 1 Download pro Tag. Pro: unbegrenzt.';
    }
  } catch (e) {
    // Not authenticated yet, or a transient error — just leave the card hidden.
  }
}

$('license-save-btn').addEventListener('click', async () => {
  const key = $('license-key-input').value.trim();
  if (!key) return toast('Erst einen Lizenzschlüssel eingeben.');
  try {
    await api('/api/license', { method: 'POST', body: { key } });
    $('license-key-input').value = '';
    toast('Lizenz aktiviert.');
    refreshLicense();
  } catch (e) {
    toast(e.message || 'Lizenzschlüssel ungültig.');
  }
});

$('login-btn').addEventListener('click', async () => {
  const password = $('login-password').value;
  $('login-error').textContent = '';
  try {
    await api('/api/login', { method: 'POST', body: { password } });
    $('login-password').value = '';
    setAuthed(true);
  } catch (e) {
    $('login-error').textContent = 'Falsches Passwort.';
  }
});
$('login-password').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('login-btn').click(); });

function updateResultsCount() {
  const total = document.querySelectorAll('.media-pick').length;
  const picked = document.querySelectorAll('.media-pick:checked').length;
  $('results-count').textContent = `${total} gefunden, ${picked} ausgewählt`;
}

function clearResults() {
  lastScrape = null;
  $('media-list').innerHTML = '';
  $('scrape-results').classList.add('hidden');
}

function renderMedia(result) {
  lastScrape = result;
  const list = $('media-list');
  list.innerHTML = '';
  if (!result.items.length) {
    list.innerHTML = '<li class="empty">Keine Medien auf dieser Seite gefunden.</li>';
    $('scrape-results').classList.remove('hidden');
    $('results-count').textContent = '';
    return;
  }
  result.items.forEach((item, idx) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <input type="checkbox" class="media-pick" data-idx="${idx}" />
      <span class="tag">${item.media_type}</span>
      <span class="item-name" title="${item.filename}">${item.filename}</span>
    `;
    list.appendChild(li);
  });
  $('scrape-results').classList.remove('hidden');
  updateResultsCount();
}

$('media-list').addEventListener('change', (e) => {
  if (e.target.classList.contains('media-pick')) updateResultsCount();
});

$('scrape-btn').addEventListener('click', async () => {
  const url = $('scrape-url').value.trim();
  if (!url) return toast('Erst eine URL eingeben.');
  $('scrape-btn').disabled = true;
  try {
    const result = await api('/api/scrape', { method: 'POST', body: { url, deep: $('scrape-deep').checked } });
    renderMedia(result);
    if (result.errors && result.errors.length) toast(result.errors[0]);
  } catch (e) {
    toast(e.message || 'Durchsuchen fehlgeschlagen.');
  } finally {
    $('scrape-btn').disabled = false;
  }
});

async function queueSource(source, audioOnly) {
  await api('/api/queue', { method: 'POST', body: { source, audio_only: !!audioOnly } });
  toast('In Warteschlange eingereiht.');
  refreshQueue();
}

$('direct-queue-btn').addEventListener('click', () => {
  const url = $('scrape-url').value.trim();
  if (!url) return toast('Erst eine URL eingeben.');
  queueSource(url, false).catch((e) => toast(e.message || 'Fehler beim Einreihen.'));
});

$('direct-audio-btn').addEventListener('click', () => {
  const url = $('scrape-url').value.trim();
  if (!url) return toast('Erst eine URL eingeben.');
  queueSource(url, true).catch((e) => toast(e.message || 'Fehler beim Einreihen.'));
});

$('select-all-btn').addEventListener('click', () => {
  document.querySelectorAll('.media-pick').forEach((cb) => { cb.checked = true; });
  updateResultsCount();
});

$('deselect-all-btn').addEventListener('click', () => {
  document.querySelectorAll('.media-pick').forEach((cb) => { cb.checked = false; });
  updateResultsCount();
});

$('clear-results-btn').addEventListener('click', () => {
  clearResults();
});

$('queue-selected-btn').addEventListener('click', async () => {
  if (!lastScrape) return;
  const picked = Array.from(document.querySelectorAll('.media-pick:checked')).map((cb) => lastScrape.items[Number(cb.dataset.idx)]);
  if (!picked.length) return toast('Mindestens ein Element auswählen.');
  try {
    for (const item of picked) {
      await queueSource(item.url, false);
    }
  } catch (e) {
    toast(e.message || 'Fehler beim Einreihen der Auswahl.');
  }
});

function formatBytes(bytes) {
  if (!bytes || bytes < 0) return '0 MB';
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function jobRow(job) {
  const li = document.createElement('li');
  const files = (job.files || []).map((f) => `<a class="dl-link" href="${f.download_url}">${f.filename}</a>`).join(' &middot; ');
  let progressHtml = '';
  if (job.status === 'in_progress' && job.total_bytes) {
    const pct = Math.min(100, Math.max(0, (job.downloaded_bytes / job.total_bytes) * 100));
    progressHtml = `
      <div class="progress-track"><div class="progress-fill" style="width:${pct.toFixed(1)}%"></div></div>
      <div class="progress-label">${formatBytes(job.downloaded_bytes)} / ${formatBytes(job.total_bytes)} (${pct.toFixed(0)}%)</div>
    `;
  }
  li.innerHTML = `
    <span class="job-status status-${job.status}">${job.status}</span>
    <span class="item-name">${job.source}${job.error ? `<br/><span class="muted">${job.error}</span>` : ''}${files ? `<br/>${files}` : ''}</span>
    ${progressHtml}
  `;
  if (job.status === 'pending' || job.status === 'in_progress') {
    const btn = document.createElement('button');
    btn.className = 'secondary';
    btn.textContent = 'Abbrechen';
    btn.addEventListener('click', async () => {
      try { await api(`/api/queue/${job.id}/cancel`, { method: 'POST' }); refreshQueue(); }
      catch (e) { toast(e.message || 'Abbrechen fehlgeschlagen.'); }
    });
    li.appendChild(btn);
  }
  return li;
}

async function refreshQueue() {
  try {
    const data = await api('/api/queue');
    const list = $('job-list');
    list.innerHTML = '';
    if (!data.jobs.length) {
      list.innerHTML = '<li class="muted">Noch nichts in der Warteschlange.</li>';
      return;
    }
    data.jobs.forEach((job) => list.appendChild(jobRow(job)));
  } catch (e) {
    if (e.unauthorized) setAuthed(false);
  }
}

setInterval(() => { if (!$('app').classList.contains('hidden')) refreshQueue(); }, 4000);
checkAuth();
</script>
</body>
</html>
