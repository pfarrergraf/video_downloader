<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DownloadThat Product Cinema V3 — Preview</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;background:#08070d;color:#fff;font-family:Inter,system-ui,sans-serif}.bar{position:sticky;top:0;z-index:20;display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:12px 16px;background:#0d0a15e8;border-bottom:1px solid #ffffff1c;backdrop-filter:blur(14px)}.bar b{margin-right:auto}.bar button,.bar a{min-height:38px;padding:0 13px;border:1px solid #ffffff20;border-radius:10px;background:#ffffff0a;color:#fff;text-decoration:none;cursor:pointer}.bar button.active{background:linear-gradient(110deg,#ff657d,#ffad65,#40e3c4);color:#08070d;border-color:transparent;font-weight:800}.stage{display:grid;place-items:center;min-height:calc(100vh - 64px);padding:20px}.frame{width:100%;height:calc(100vh - 96px);border:1px solid #ffffff20;border-radius:18px;overflow:hidden;background:#000;box-shadow:0 30px 80px #0008;transition:.35s}.frame.tablet{width:768px;height:1024px;max-height:calc(100vh - 96px)}.frame.mobile{width:390px;height:844px;max-height:calc(100vh - 96px)}iframe{width:100%;height:100%;border:0;background:#08070d}.note{padding:12px 16px;color:#bfb6ca;font-size:12px}@media(max-width:700px){.bar b{width:100%}.stage{padding:8px}.frame,.frame.tablet,.frame.mobile{max-width:100%;height:calc(100vh - 150px)}}
</style>
</head>
<body>
<div class="bar"><b>DownloadThat · Product Cinema V3</b><button class="active" data-mode="desktop">Desktop</button><button data-mode="tablet">Tablet</button><button data-mode="mobile">Mobile</button><button id="reload">Neu starten</button><a href="gpt_hero_product_cinema_v3.html" target="_blank">Vollbild</a></div>
<div class="stage"><div class="frame" id="frame"><iframe id="demo" src="gpt_hero_product_cinema_v3.html" title="Product Cinema V3"></iframe></div></div>
<div class="note">Vollausbau beider Ideen: magnetischer Medien-Datenstrom und kontrollierte Kamerafahrt durch das Smartphone.</div>
<script>
const frame=document.querySelector('#frame'),demo=document.querySelector('#demo');
document.querySelectorAll('[data-mode]').forEach(button=>button.addEventListener('click',()=>{document.querySelectorAll('[data-mode]').forEach(item=>item.classList.remove('active'));button.classList.add('active');frame.className='frame '+(button.dataset.mode==='desktop'?'':button.dataset.mode)}));
document.querySelector('#reload').addEventListener('click',()=>{demo.src='gpt_hero_product_cinema_v3.html?t='+Date.now()});
</script>
</body>
</html>
