<!doctype html><meta charset="utf-8"><title>GPT DownloadThat Multilingual Kit</title><style>body{margin:0;background:#0b0a12;color:#f8f5ee;font:16px system-ui}header{max-width:1200px;margin:auto;padding:48px 24px}main{max-width:1400px;margin:auto;padding:0 24px 70px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}.card{min-height:520px;border:1px solid #4d405f;border-radius:24px;padding:26px;background:radial-gradient(circle at 10% 5%,#542434,#171320 45%,#07363a);display:flex;flex-direction:column}.brand{font-weight:900;font-size:25px}.lang{color:#b7aebe}.title{font-weight:950;font-size:42px;line-height:1.02;margin:70px 0 20px}.body{color:#c4bacb;font-size:20px}.steps{margin-top:auto;background:#211b30;border-radius:18px;padding:18px}.steps div{padding:10px;border-bottom:1px solid #4d405f}.cta{background:#dfbc6f;color:#08070e;text-align:center;font-weight:900;padding:16px;border-radius:18px;margin-top:20px}.rtl{direction:rtl;text-align:right}</style><header><h1>GPT DownloadThat — Multilingual Creator Kit</h1><p>German · English · French · Spanish · Italian · Arabic · Japanese · Chinese</p></header><main id="grid"></main><script>fetch('gpt_creator_tools/gpt_locales/gpt_locales.json').then(r=>r.json()).then(data=>{const grid=document.querySelector('#grid');for(const [code,l] of Object.entries(data)){const e=document.createElement('article');e.className='card '+(l.dir==='rtl'?'rtl':'');e.innerHTML=`<div class="brand">↓ DownloadThat</div><div class="lang">${l.name}</div><div class="title">${l.headline}</div><div class="body">${l.body}</div><div class="steps"><div>1 · ${l.steps[0]}</div><div>2 · ${l.steps[1]}</div><div>3 · ${l.steps[2]}</div></div><div class="cta">${l.cta}</div>`;grid.append(e)}})</script>
