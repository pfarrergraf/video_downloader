<!doctype html>
<html><head>{{>base_head}}
<style>
  body.{{{theme}}} { display:flex; align-items:center; padding:48px 64px; gap:48px; }
  .copy { flex:1.4; display:flex; flex-direction:column; gap:22px; min-width:0; }
  h1 { font-size:62px; line-height:1.06; }
  .sub { font-size:25px; color:var(--muted); font-weight:600; line-height:1.4; }
  .btn { font-size:24px; padding:16px 34px; align-self:flex-start; }
  .side { flex:.75; display:flex; align-items:center; justify-content:center; gap:30px; }
  .phone { width:200px; height:330px; border-radius:28px; border-width:6px; }
  .qr-frame { width:190px; height:190px; padding:14px; flex:none; }
  .tag { position:absolute; top:24px; right:32px; font-size:17px; padding:7px 18px; }
</style></head>
<body class="{{{theme}}}" style="position:relative;">
  <div class="chip-ghost tag">{{{banner_tag}}}</div>
  <div class="copy">
    {{>logo_row}}
    <h1>{{{banner_title}}}</h1>
    <div class="sub">{{{banner_sub}}}</div>
    {{#banner_cta}}<div class="btn">{{{banner_cta}}}</div>{{/banner_cta}}
  </div>
  <div class="side">
    {{#banner_shot}}<div class="phone"><img src="__STORE_ASSETS__/{{{banner_shot}}}" alt=""></div>{{/banner_shot}}
    {{#banner_qr}}<div class="qr-frame">{{{qr_svg}}}</div>{{/banner_qr}}
  </div>
</body></html>
