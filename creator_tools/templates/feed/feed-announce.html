<!doctype html>
<html><head>{{>base_head}}
<style>
  body.{{{theme}}} { display:flex; flex-direction:column; padding:64px 68px; }
  .head { display:flex; justify-content:space-between; align-items:center; }
  .mid { flex:1; display:flex; gap:52px; align-items:center; min-height:0; }
  .copy { flex:1.2; display:flex; flex-direction:column; gap:32px; min-width:0; }
  .chip.big { font-size:26px; padding:14px 32px; align-self:flex-start; }
  h1 { font-size:80px; line-height:1.05; }
  .desc { font-size:31px; font-weight:500; color:var(--muted); line-height:1.45; }
  .btn { font-size:30px; padding:22px 40px; align-self:flex-start; }
  .phone { width:380px; height:600px; flex:none; }
  .foot { flex:none; display:flex; justify-content:space-between; align-items:center; margin-top:24px; gap:24px; }
  .footnote { font-size:19px; line-height:1.3; max-width:660px; }
  .handle { font-size:24px; font-weight:700; color:var(--muted); }
</style></head>
<body class="{{{theme}}}">
  <div class="head">
    {{>logo_row}}
    <div class="chip-ghost" style="font-size:22px;padding:10px 24px;">{{t.ad_label}}</div>
  </div>
  <div class="mid">
    <div class="copy">
      <div class="chip big">{{{ann_badge}}}</div>
      <h1>{{{ann_title}}}</h1>
      <div class="desc">{{{ann_desc}}}</div>
      <div class="btn">{{{ann_cta}}}</div>
    </div>
    <div class="phone"><img src="__STORE_ASSETS__/{{{ann_shot}}}" alt=""></div>
  </div>
  <div class="foot">
    <div class="footnote">{{{ann_foot}}}</div>
    <div class="handle" data-autofit data-autofit-min="16">{{creator.creator_handle}}</div>
  </div>
</body></html>
