<!doctype html>
<html><head>{{>base_head}}
<style>
  body.{{{theme}}} { display:flex; flex-direction:column; align-items:center; text-align:center; padding:200px 80px 300px; position:relative; }
  h1 { font-size:118px; line-height:1.02; margin-top:60px; }
  .sub { font-size:40px; font-weight:700; color:var(--muted); margin-top:30px; }
  .stage { flex:1; display:flex; align-items:center; justify-content:center; position:relative; margin-top:40px; }
  .phone { width:520px; height:820px; }
  .play { position:absolute; width:170px; height:170px; border-radius:50%; background:var(--grad);
          display:flex; align-items:center; justify-content:center; box-shadow:0 30px 80px rgba(0,0,0,.45); }
  .play::after { content:""; border-style:solid; border-width:34px 0 34px 56px; border-color:transparent transparent transparent var(--chip-ink); margin-left:12px; }
  .chip { font-size:30px; padding:16px 36px; position:absolute; top:110px; right:80px; }
</style></head>
<body class="{{{theme}}}">
  {{>logo_row}}
  <div class="chip">{{{cover_badge}}}</div>
  <h1>{{{cover_title}}}</h1>
  <div class="sub">{{{cover_sub}}}</div>
  <div class="stage">
    <div class="phone"><img src="__STORE_ASSETS__/screenshot_queue.png" alt=""></div>
    <div class="play"></div>
  </div>
</body></html>
