<!doctype html>
<html><head>{{>base_head}}
<style>
  body.{{{theme}}} { display:flex; flex-direction:column; }
  .safe { flex:1; display:flex; flex-direction:column; padding:230px 72px 330px; }
  .head { display:flex; justify-content:space-between; align-items:center; }
  h1 { font-size:88px; line-height:1.05; margin-top:44px; }
  .list { flex:1; display:flex; flex-direction:column; justify-content:center; gap:30px; }
  .item { display:flex; gap:26px; align-items:flex-start; padding:32px 36px; }
  .item .mark { width:56px; height:56px; border-radius:16px; background:var(--grad); color:var(--chip-ink);
                display:flex; align-items:center; justify-content:center; font-weight:800; font-size:32px; flex:none; }
  .item .txt { font-size:37px; font-weight:700; line-height:1.25; }
  .item .sub { font-size:25px; font-weight:500; color:var(--muted); margin-top:6px; line-height:1.35; }
  .foot { display:flex; align-items:center; justify-content:space-between; gap:24px; }
  .footnote { font-size:22px; max-width:620px; line-height:1.3; }
  .handle { font-size:30px; font-weight:700; color:var(--muted); }
</style></head>
<body class="{{{theme}}}">
  <div class="safe">
    <div class="head">
      {{>logo_row}}
      <div class="chip-ghost" style="font-size:26px;padding:12px 28px;">{{t.ad_label}}</div>
    </div>
    <h1>{{{story_title}}}</h1>
    <div class="list">
      <div class="item card"><div class="mark">✓</div><div><div class="txt">{{{item1}}}</div><div class="sub">{{{item1_sub}}}</div></div></div>
      <div class="item card"><div class="mark">✓</div><div><div class="txt">{{{item2}}}</div><div class="sub">{{{item2_sub}}}</div></div></div>
      <div class="item card"><div class="mark">✓</div><div><div class="txt">{{{item3}}}</div><div class="sub">{{{item3_sub}}}</div></div></div>
    </div>
    <div class="foot">
      <div class="footnote">{{{story_foot}}}</div>
      <div class="handle" data-autofit data-autofit-min="20">{{creator.creator_handle}}</div>
    </div>
  </div>
</body></html>
