<!doctype html>
<html><head>{{>base_head}}
<style>
  body.{{{theme}}} { display:flex; flex-direction:column; }
  .safe { flex:1; display:flex; flex-direction:column; padding:230px 72px 330px; }
  .head { display:flex; justify-content:space-between; align-items:center; }
  .mid { flex:1; display:flex; flex-direction:column; justify-content:center; gap:40px; }
  h1 { font-size:104px; line-height:1.04; }
  .sub { font-size:40px; font-weight:600; color:var(--muted); line-height:1.4; }
  .shot { display:flex; justify-content:center; }
  .phone { width:420px; height:520px; }
  .phone img { object-position: top; }
  .foot { display:flex; align-items:center; justify-content:space-between; gap:24px; }
  .btn { font-size:32px; padding:24px 44px; }
  .handle { font-size:30px; font-weight:700; color:var(--muted); }
</style></head>
<body class="{{{theme}}}">
  <div class="safe">
    <div class="head">
      {{>logo_row}}
      <div class="chip-ghost" style="font-size:26px;padding:12px 28px;">{{t.ad_label}}</div>
    </div>
    <div class="mid">
      <h1>{{{story_title}}}</h1>
      <div class="sub">{{{story_sub}}}</div>
      {{#story_shot}}<div class="shot"><div class="phone"><img src="__STORE_ASSETS__/{{{story_shot}}}" alt=""></div></div>{{/story_shot}}
    </div>
    <div class="foot">
      <div class="btn">{{{story_cta}}}</div>
      <div class="handle" data-autofit data-autofit-min="20">{{creator.creator_handle}}</div>
    </div>
  </div>
</body></html>
