<!doctype html>
<html><head>{{>base_head}}
<style>
  body.{{{theme}}} { display:flex; flex-direction:column; padding:48px 64px 40px; }
  .main { flex:1; display:flex; gap:40px; min-height:0; }
  .copy { flex:1.4; display:flex; flex-direction:column; justify-content:center; gap:28px; }
  h1 { font-size:92px; line-height:1.02; font-weight:700; }
  h1 em { font-style:normal; }
  .sub { font-size:33px; font-weight:700; color:var(--muted); }
  .stage { flex:1; display:flex; align-items:center; justify-content:center; }
  .phone { width:280px; height:520px; transform:rotate(4deg); }
  .foot { display:flex; justify-content:space-between; align-items:center; }
  .chip { font-size:28px; padding:13px 30px; }
</style></head>
<body class="{{{theme}}}">
  <div class="main">
    <div class="copy">
      <h1>{{{thumb_title}}}</h1>
      <div class="sub">{{{thumb_sub}}}</div>
    </div>
    <div class="stage"><div class="phone"><img src="__STORE_ASSETS__/{{{thumb_shot}}}" alt=""></div></div>
  </div>
  <div class="foot">
    {{>logo_row}}
    <div class="chip">{{{thumb_badge}}}</div>
  </div>
</body></html>
