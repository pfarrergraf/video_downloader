<meta charset="utf-8">
<style>
  @font-face { font-family: "Inter"; src: url("__KIT_ASSETS__/fonts/Inter.ttf"); font-weight: 100 900; }
  @font-face { font-family: "Space Grotesk"; src: url("__KIT_ASSETS__/fonts/SpaceGrotesk.ttf"); font-weight: 300 700; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: {{{W}}}px; height: {{{H}}}px; overflow: hidden; }
  body { font-family: "Inter", sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  h1,h2,h3,.display { font-family: "Space Grotesk", "Inter", sans-serif; letter-spacing: -0.02em; }
  img { max-width: 100%; display: block; }

  /* ---------- Theme: Premium Tech (Website-Gold) ---------- */
  .theme-pt {
    --bg:#0e0c14; --bg2:#16121f; --card:#1b1626; --border:#2c2438;
    --ink:#f1ede4; --muted:#a89fb3;
    --accent:#c9a869; --accent2:#d9bb82;
    --grad:linear-gradient(120deg,#8a713f 0%,#c9a869 45%,#ecd9a8 100%);
    --chip-ink:#14111c;
    background:
      radial-gradient(120% 70% at 85% -10%, rgba(201,168,105,.14), transparent 60%),
      radial-gradient(90% 60% at -10% 110%, rgba(138,113,63,.12), transparent 55%),
      var(--bg);
    color: var(--ink);
  }
  /* ---------- Theme: Creator Energy (App-Gradient) ---------- */
  .theme-ce {
    --bg:#12101f; --bg2:#181530; --card:#1c1a2e; --border:#2e2b47;
    --ink:#ffffff; --muted:#b9b3d0;
    --accent:#ff6b6b; --accent2:#4adfb6;
    --grad:linear-gradient(100deg,#ff6b6b 0%,#ffb26b 50%,#4adfb6 100%);
    --chip-ink:#12101f;
    background:
      radial-gradient(100% 60% at 110% 0%, rgba(74,223,182,.16), transparent 55%),
      radial-gradient(110% 70% at -15% 100%, rgba(255,107,107,.16), transparent 55%),
      var(--bg);
    color: var(--ink);
  }
  /* ---------- Theme: Clean Utility (hell) ---------- */
  .theme-cu {
    --bg:#f7f6f2; --bg2:#efede7; --card:#ffffff; --border:#e2dfd6;
    --ink:#191621; --muted:#5f5b6d;
    --accent:#e05252; --accent2:#159f7d;
    --grad:linear-gradient(100deg,#e05252 0%,#e8945a 50%,#159f7d 100%);
    --chip-ink:#ffffff;
    background: var(--bg);
    color: var(--ink);
  }

  /* ---------- Gemeinsame Bausteine ---------- */
  .grad-text { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .kicker { font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); }
  .muted { color: var(--muted); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; }
  .chip { display: inline-flex; align-items: center; gap: .45em; font-weight: 700; border-radius: 999px;
          background: var(--grad); color: var(--chip-ink); }
  .chip-ghost { display: inline-flex; align-items: center; gap:.45em; font-weight: 600; border-radius: 999px;
          border: 1.5px solid var(--border); color: var(--muted); background: transparent; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap:.5em; font-weight: 800;
         border-radius: 999px; background: var(--grad); color: var(--chip-ink); }
  .rule { height: 1px; background: var(--border); }
  .logo-row { display: flex; align-items: center; }
  .logo-tile { border-radius: 26%; overflow: hidden; flex: none; }
  .wordmark { font-family: "Space Grotesk"; font-weight: 700; letter-spacing: -0.02em; }
  .ad-tag { position: absolute; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
            color: var(--muted); border: 1.5px solid var(--border); border-radius: 999px; }
  .footnote { color: var(--muted); }
  ul.checks { list-style: none; }
  ul.checks li { display: flex; gap: .55em; align-items: baseline; }
  ul.checks li::before { content: "✓"; color: var(--accent2); font-weight: 800; flex: none; }
  .theme-pt ul.checks li::before { color: var(--accent); }

  /* Telefonrahmen für echte Screenshots */
  .phone { border-radius: 44px; border: 10px solid #060509; background: #060509;
           box-shadow: 0 40px 90px rgba(0,0,0,.5); overflow: hidden; position: relative; }
  .theme-cu .phone { box-shadow: 0 30px 70px rgba(25,22,33,.28); }
  .phone img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

  .qr-frame { background: #ffffff; border-radius: 24px; padding: 26px; }
  .qr-frame svg { width: 100%; height: 100%; display: block; }
</style>
<script>
  /* Verkleinert personalisierte Felder (lange Namen/Links), bis sie passen. */
  window.addEventListener("load", () => {
    document.querySelectorAll("[data-autofit]").forEach((el) => {
      let size = parseFloat(getComputedStyle(el).fontSize);
      const min = parseFloat(el.dataset.autofitMin || "16");
      let guard = 80;
      while (guard-- > 0 && size > min &&
             (el.scrollWidth > el.clientWidth || el.scrollHeight > el.clientHeight)) {
        size -= 1;
        el.style.fontSize = size + "px";
      }
    });
  });
</script>
