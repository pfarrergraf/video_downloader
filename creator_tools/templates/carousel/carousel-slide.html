<!doctype html>
<html><head>{{>base_head}}
<style>
  body.{{{theme}}} { display:flex; flex-direction:column; padding:70px 76px; position:relative; }
  .head { display:flex; justify-content:space-between; align-items:center; }
  .pagenum { font-family:"Space Grotesk"; font-weight:700; font-size:30px; color:var(--muted); }
  .mid { flex:1; display:flex; flex-direction:column; justify-content:center; gap:38px; min-height:0; }
  .bignum { font-family:"Space Grotesk"; font-weight:700; font-size:210px; line-height:1; opacity:.92; }
  h1 { font-size:84px; line-height:1.05; }
  .desc { font-size:34px; font-weight:500; color:var(--muted); line-height:1.5; max-width:880px; }
  body.has-shot h1, body.has-shot .desc { max-width:600px; }
  .shot { position:absolute; right:-40px; bottom:120px; width:360px; height:480px; transform:rotate(-5deg); opacity:.98; }
  .foot { flex:none; display:flex; justify-content:space-between; align-items:center; gap:24px; }
  .swipe { font-size:26px; font-weight:800; letter-spacing:.06em; }
  .footnote { font-size:19px; color:var(--muted); }
</style></head>
<body class="{{{theme}}}{{#slide_shot}} has-shot{{/slide_shot}}">
  <div class="head">
    {{>logo_row}}
    <div style="display:flex;align-items:center;gap:20px;">
      <div class="chip-ghost" style="font-size:20px;padding:9px 22px;">{{t.ad_label}}</div>
      <div class="pagenum">{{{page_no}}}/{{{page_total}}}</div>
    </div>
  </div>
  <div class="mid">
    {{#slide_num}}<div class="bignum grad-text">{{{slide_num}}}</div>{{/slide_num}}
    <h1>{{{slide_title}}}</h1>
    <div class="desc">{{{slide_desc}}}</div>
  </div>
  {{#slide_shot}}<div class="shot phone"><img src="__STORE_ASSETS__/{{{slide_shot}}}" alt=""></div>{{/slide_shot}}
  <div class="foot">
    <div class="swipe grad-text">{{{slide_footer_left}}}</div>
    <div class="footnote">{{creator.creator_handle}}</div>
  </div>
</body></html>
