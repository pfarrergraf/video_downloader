name: Google Play finance archive

on:
  schedule:
    - cron: "17 6 10 * *"
  workflow_dispatch:
    inputs:
      month:
        description: "Report month as YYYY-MM; defaults to previous UTC month"
        required: false
        type: string
      relevant_ytd_eur:
        description: "Owner/accounting supplied relevant YTD EUR turnover"
        required: false
        default: "0"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  archive:
    runs-on: ubuntu-latest
    environment: finance-production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_FINANCE_ARCHIVER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Resolve report month
        shell: bash
        env:
          INPUT_MONTH: ${{ inputs.month }}
        run: |
          MONTH="${INPUT_MONTH:-$(date -u -d 'last month' +%Y-%m)}"
          [[ "$MONTH" =~ ^[0-9]{4}-[0-9]{2}$ ]] || { echo "Invalid month: $MONTH"; exit 1; }
          echo "MONTH=$MONTH" >> "$GITHUB_ENV"
          echo "MONTH_COMPACT=${MONTH//-/}" >> "$GITHUB_ENV"

      - name: Require archive configuration
        shell: bash
        env:
          PLAY_REPORTS_SOURCE_URI: ${{ secrets.PLAY_REPORTS_SOURCE_URI }}
          GCS_FINANCE_ARCHIVE_BUCKET: ${{ secrets.GCS_FINANCE_ARCHIVE_BUCKET }}
          AGE_RECIPIENT: ${{ secrets.FINANCE_AGE_RECIPIENT }}
        run: |
          test -n "$PLAY_REPORTS_SOURCE_URI"
          test -n "$GCS_FINANCE_ARCHIVE_BUCKET"
          test -n "$AGE_RECIPIENT"

      - name: Download original Google Play monthly reports
        shell: bash
        env:
          PLAY_REPORTS_SOURCE_URI: ${{ secrets.PLAY_REPORTS_SOURCE_URI }}
        run: |
          mkdir -p incoming raw-reports
          gcloud storage cp "$PLAY_REPORTS_SOURCE_URI/sales/salesreport_${MONTH_COMPACT}.zip" incoming/
          gcloud storage cp "$PLAY_REPORTS_SOURCE_URI/earnings/*${MONTH_COMPACT}*.zip" incoming/
          for archive in incoming/*.zip; do unzip -n "$archive" -d raw-reports; done
          find raw-reports -type f -name '*.csv' -print -quit | grep -q .

      - name: Build immutable evidence package
        env:
          YTD: ${{ inputs.relevant_ytd_eur || '0' }}
          BUCKET: ${{ secrets.GCS_FINANCE_ARCHIVE_BUCKET }}
        shell: bash
        run: |
          mkdir -p prior-archive
          gcloud storage cp --recursive "gs://$BUCKET/google-play/${MONTH:0:4}-*" prior-archive/ || true
          uv run python scripts/google_play_finance.py --input raw-reports --output "archive/$MONTH" --month "$MONTH" --ytd-relevant-eur "$YTD" --prior-archive prior-archive

      - name: Encrypt package with offline-owner public key
        shell: bash
        env:
          AGE_RECIPIENT: ${{ secrets.FINANCE_AGE_RECIPIENT }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y age
          tar -C archive -czf "downloadthat-google-play-finance-${MONTH}.tar.gz" "$MONTH"
          age -r "$AGE_RECIPIENT" -o "downloadthat-google-play-finance-${MONTH}.tar.gz.age" "downloadthat-google-play-finance-${MONTH}.tar.gz"
          sha256sum "downloadthat-google-play-finance-${MONTH}.tar.gz.age" > "downloadthat-google-play-finance-${MONTH}.tar.gz.age.sha256"
          rm "downloadthat-google-play-finance-${MONTH}.tar.gz"

      - name: Upload originals, derived evidence and encrypted mirror source
        shell: bash
        env:
          BUCKET: ${{ secrets.GCS_FINANCE_ARCHIVE_BUCKET }}
        run: |
          gcloud storage cp --recursive "archive/$MONTH" "gs://$BUCKET/google-play/$MONTH/"
          gcloud storage cp "downloadthat-google-play-finance-${MONTH}.tar.gz.age" "downloadthat-google-play-finance-${MONTH}.tar.gz.age.sha256" "gs://$BUCKET/google-play/$MONTH/"

      - name: Retain encrypted package for local scheduled sync
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: google-play-finance-${{ env.MONTH }}-encrypted
          path: |
            downloadthat-google-play-finance-${{ env.MONTH }}.tar.gz.age
            downloadthat-google-play-finance-${{ env.MONTH }}.tar.gz.age.sha256
          retention-days: 30
