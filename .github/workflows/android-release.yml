name: Android release

# Deliberately a separate workflow from android-build.yml (not folded into its
# `push.paths`-filtered trigger): a release is "build me an installable APK
# from whatever HEAD currently is," which should happen on every tag push
# regardless of which files that specific commit touched — combining `tags`
# and `paths` filters on one `push` trigger ANDs them together and could skip
# a release for a tag that (say) only bumps a version string.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | sort -V | tail -1)"
          fi
          "$SDKMANAGER" --install "ndk;26.1.10909125"

      # Release ships arm64-v8a only (see build.gradle's abiFilterList) — no
      # need to also cross-compile the x86_64 ffmpeg binary that only exists
      # for the debug/emulator-smoke-test path in android-build.yml.
      - name: Build ffmpeg for arm64-v8a
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: bash .github/scripts/build_ffmpeg_android.sh "arm64-v8a" "$PWD/ffmpeg-out"

      - name: Upload ffmpeg binary
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-arm64-v8a
          path: ffmpeg-out/bin/ffmpeg

  build-signed-release:
    needs: build-ffmpeg
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up build-time Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Download ffmpeg binary
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-arm64-v8a
          path: android/ffmpeg-artifacts/ffmpeg-arm64-v8a

      - name: Place ffmpeg binary into jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ffmpeg-artifacts/ffmpeg-arm64-v8a/ffmpeg app/src/main/jniLibs/arm64-v8a/libffmpeg.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libffmpeg.so

      - name: Verify signing secrets are configured
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64/ANDROID_KEYSTORE_PASSWORD/ANDROID_KEY_ALIAS/ANDROID_KEY_PASSWORD must be set as repository secrets before a release build can produce a signed, installable APK. See docs/ANDROID_APP_PLAN.md Phase 4 for one-time setup instructions."
            exit 1
          fi

      - name: Build signed release APK (arm64-v8a only)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease -PabiFilters=arm64-v8a --stacktrace

      - name: Rename APK to include version tag
        run: |
          mkdir -p release-out
          cp app/build/outputs/apk/release/app-release.apk "release-out/DownloadThat-${{ github.ref_name }}.apk"

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/release-out/DownloadThat-${{ github.ref_name }}.apk
          generate_release_notes: true
