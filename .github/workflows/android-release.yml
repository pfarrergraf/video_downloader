name: Android release

# Deliberately a separate workflow from android-build.yml (not folded into its
# `push.paths`-filtered trigger): a release is "build me an installable APK
# from whatever HEAD currently is," which should happen on every tag push
# regardless of which files that specific commit touched — combining `tags`
# and `paths` filters on one `push` trigger ANDs them together and could skip
# a release for a tag that (say) only bumps a version string.
on:
  push:
    tags:
      - "v*.*.*"
  # Fallback trigger: GitHub's mobile "New release" web form has proven
  # unreliable (POST hangs on "Publishing..." and silently produces no tag
  # or release, no error shown) — this lets a release be built and published
  # from the much simpler Actions "Run workflow" form instead, without
  # needing the release-creation UI to work at all.
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release, e.g. v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install NDK
        run: |
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | sort -V | tail -1)"
          fi
          "$SDKMANAGER" --install "ndk;27.0.12077973"

      # Release ships arm64-v8a only (see build.gradle's abiFilterList) — no
      # need to also cross-compile the x86_64 ffmpeg binary that only exists
      # for the debug/emulator-smoke-test path in android-build.yml.
      - name: Build ffmpeg for arm64-v8a
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: bash .github/scripts/build_ffmpeg_android.sh "arm64-v8a" "$PWD/ffmpeg-out"

      - name: Upload ffmpeg binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ffmpeg-arm64-v8a
          path: ffmpeg-out/bin/ffmpeg

  build-signed-release:
    needs: build-ffmpeg
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    env:
      # On a tag push, github.ref_name is already the tag (e.g. v0.2.0). On a
      # manual workflow_dispatch run, ref_name would be the branch name
      # instead, so the tag to release has to come from the input.
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      PLAY_STORE_URL: ${{ vars.PLAY_STORE_URL || 'https://play.google.com/store/apps/details?id=de.classydl.app' }}
      LICENSE_API_BASE_URL: ${{ vars.LICENSE_API_BASE_URL || 'https://downloadthat.app' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up build-time Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          gradle-version: "8.13"

      - name: Download ffmpeg binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ffmpeg-arm64-v8a
          path: android/ffmpeg-artifacts/ffmpeg-arm64-v8a

      - name: Place ffmpeg binary into jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp ffmpeg-artifacts/ffmpeg-arm64-v8a/ffmpeg app/src/main/jniLibs/arm64-v8a/libffmpeg.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libffmpeg.so

      - name: Verify app-signing and upload-key secrets are configured
        env:
          ANDROID_APP_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_APP_SIGNING_KEYSTORE_BASE64 }}
          # Falls back to the pre-key-split legacy secret name so a diagnostic
          # build can run before ANDROID_UPLOAD_KEYSTORE_BASE64 exists. The
          # later "Verify flavor separation, signatures..." step still checks
          # the resulting cert against ANDROID_UPLOAD_CERT_SHA256, so a wrong
          # key here fails loudly instead of producing a bad artifact.
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 || secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_APP_SIGNING_KEYSTORE_BASE64" ] || [ -z "$ANDROID_UPLOAD_KEYSTORE_BASE64" ] || [ -z "$PLAY_STORE_URL" ]; then
            echo "::error::Both the transferred app-signing key (Direct APK) and separate Play upload key are required."
            exit 1
          fi

      # Without this, every release build kept Chaquopy's placeholder
      # versionCode/versionName (1 / "0.1.0") baked into the APK regardless
      # of the git tag - v0.2.0's binary was correct, but nothing in the app
      # itself would ever show it, so an installed update was indistinguishable
      # from the previous one. versionCode must strictly increase release over
      # release for Android to treat an install as an update.
      - name: Derive version code/name from tag
        run: |
          VERSION_NAME="${RELEASE_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Reject a non-monotone versionCode
        shell: bash
        run: |
          metadata="$(curl --fail --silent --location https://github.com/pfarrergraf/video_downloader/releases/latest/download/DownloadThat-release.json || true)"
          if [ -n "$metadata" ]; then
            previous="$(printf '%s' "$metadata" | python -c 'import json,sys; print(json.load(sys.stdin)["versionCode"])')"
            (( VERSION_CODE > previous )) || { echo "versionCode $VERSION_CODE must exceed released $previous"; exit 1; }
          fi

      - name: Build signed Direct APK (arm64-v8a only)
        env:
          ANDROID_APP_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_APP_SIGNING_KEYSTORE_BASE64 }}
          ANDROID_APP_SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_APP_SIGNING_KEYSTORE_PASSWORD }}
          ANDROID_APP_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_APP_SIGNING_KEY_ALIAS }}
          ANDROID_APP_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_APP_SIGNING_KEY_PASSWORD }}
        run: |
          gradle :app:assembleDirectRelease -PabiFilters=arm64-v8a -PplayStoreUrl="$PLAY_STORE_URL" -PlicenseApiBaseUrl="$LICENSE_API_BASE_URL" \
            -PversionNameOverride="$VERSION_NAME" -PversionCodeOverride="$VERSION_CODE" --stacktrace

      # Play Console requires the .aab (App Bundle) format, not a raw APK. CI
      # signs this artifact with the separately revocable upload key; Google
      # verifies it and re-signs delivered APKs with the transferred app-signing
      # key. Never substitute the app-signing keystore here.
      # Not attached to the GitHub Release (that's for direct/sideload
      # installs); this is a separate build artifact for manual upload to
      # Play Console during testing-track setup.
      - name: Build signed Play App Bundle (arm64-v8a only)
        env:
          # See the fallback note on the secrets-verification step above -
          # same diagnostic reasoning applies to all four upload-key values.
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 || secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS || secrets.ANDROID_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD || secrets.ANDROID_KEY_PASSWORD }}
        run: |
          gradle :app:bundlePlayRelease -PabiFilters=arm64-v8a -PplayStoreUrl="$PLAY_STORE_URL" -PlicenseApiBaseUrl="$LICENSE_API_BASE_URL" \
            -PversionNameOverride="$VERSION_NAME" -PversionCodeOverride="$VERSION_CODE" --stacktrace

      - name: Verify flavor separation, signatures and 16 KiB native compatibility
        env:
          EXPECTED_APP_SIGNING_SHA256: ${{ secrets.ANDROID_APP_SIGNING_CERT_SHA256 }}
          EXPECTED_UPLOAD_SHA256: ${{ secrets.ANDROID_UPLOAD_CERT_SHA256 }}
        run: bash ../.github/scripts/check_android_release_artifacts.sh app/build/outputs/apk/direct/release/app-direct-release.apk app/build/outputs/bundle/playRelease/app-play-release.aab

      - name: Generate Android CycloneDX SBOM
        run: |
          gradle :app:dependencies --configuration playReleaseRuntimeClasspath > play-release-dependencies.txt
          python ../scripts/gradle_dependencies_to_cyclonedx.py play-release-dependencies.txt DownloadThat-android-sbom.cdx.json

      - name: Upload Android SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: DownloadThat-${{ env.RELEASE_TAG }}-android-sbom
          path: android/DownloadThat-android-sbom.cdx.json

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: DownloadThat-${{ env.RELEASE_TAG }}-play.aab
          path: android/app/build/outputs/bundle/playRelease/app-play-release.aab

      # Two copies: the versioned name is what shows up on the release page;
      # the "-latest" name is a stable filename so the website's download
      # button (releases/latest/download/DownloadThat-latest.apk) never needs
      # updating across releases - GitHub's "latest" alias only works for an
      # asset name that stays identical release to release.
      - name: Rename APK to include version tag
        run: |
          mkdir -p release-out
          cp app/build/outputs/apk/direct/release/app-direct-release.apk "release-out/DownloadThat-${RELEASE_TAG}-direct.apk"
          cp app/build/outputs/apk/direct/release/app-direct-release.apk "release-out/DownloadThat-latest.apk"

      # Lets testers (and android-beta.html) verify the APK they downloaded
      # actually came from this CI build, not a tampered copy from elsewhere.
      - name: Generate SHA-256 checksums
        run: |
          cd release-out
          sha256sum "DownloadThat-${RELEASE_TAG}-direct.apk" > "DownloadThat-${RELEASE_TAG}-direct.apk.sha256"
          sha256sum "DownloadThat-latest.apk" > "DownloadThat-latest.apk.sha256"

      - name: Generate release metadata JSON
        run: |
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SHA256="$(awk '{print $1}' release-out/DownloadThat-latest.apk.sha256)"
          cat > release-out/DownloadThat-release.json <<JSON
          {
            "appName": "DownloadThat",
            "packageName": "de.classydl.app",
            "versionName": "${VERSION_NAME}",
            "versionCode": ${VERSION_CODE},
            "apkFile": "DownloadThat-latest.apk",
            "sha256": "${SHA256}",
            "releaseTag": "${RELEASE_TAG}",
            "generatedAt": "${GENERATED_AT}"
          }
          JSON

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          # tag_name/name are required here (not just github.ref_name): on a
          # workflow_dispatch run there is no tag yet, so this action creates
          # one. target_commitish must be explicit too - GitHub's API defaults
          # a brand-new tag to the repo's default branch (master, stuck on an
          # ancient commit here) when it's omitted, not to the commit actually
          # built from.
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            android/release-out/DownloadThat-${{ env.RELEASE_TAG }}-direct.apk
            android/release-out/DownloadThat-${{ env.RELEASE_TAG }}-direct.apk.sha256
            android/release-out/DownloadThat-latest.apk
            android/release-out/DownloadThat-latest.apk.sha256
            android/release-out/DownloadThat-release.json
          generate_release_notes: true
