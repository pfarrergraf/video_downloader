name: Android build

on:
  push:
    branches: ["**"]
    paths:
      - "android/**"
      - "video_downloader/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up build-time Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: classydl-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  emulator-smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: classydl-debug-apk
          path: apk

      - name: Enable KVM for hardware-accelerated emulation
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install app in emulator and smoke-test /api/health
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r apk/app-debug.apk
            adb shell am start -n de.classydl.app/.MainActivity
            adb forward tcp:8420 tcp:8420
            for i in $(seq 1 20); do
              if curl -sf http://127.0.0.1:8420/api/health; then
                echo "Server responded — smoke test passed."
                exit 0
              fi
              sleep 2
            done
            echo "Server never responded on /api/health" >&2
            adb logcat -d | tail -n 200
            exit 1
