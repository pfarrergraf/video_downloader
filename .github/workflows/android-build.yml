name: Android build

on:
  push:
    branches: ["**"]
    paths:
      - "android/**"
      - "video_downloader/**"
      - ".github/workflows/android-build.yml"
      - ".github/scripts/**"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install NDK
        run: |
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER="$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | sort -V | tail -1)"
          fi
          "$SDKMANAGER" --install "ndk;27.0.12077973"

      - name: Build ffmpeg for ${{ matrix.abi }}
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: bash .github/scripts/build_ffmpeg_android.sh "${{ matrix.abi }}" "$PWD/ffmpeg-out"

      - name: Upload ffmpeg binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ffmpeg-${{ matrix.abi }}
          path: ffmpeg-out/bin/ffmpeg
          retention-days: 1

  build:
    needs: build-ffmpeg
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up build-time Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        with:
          gradle-version: "8.13"

      - name: Download ffmpeg binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ffmpeg-*
          path: android/ffmpeg-artifacts

      - name: Place ffmpeg binaries into jniLibs
        run: |
          for abi_dir in ffmpeg-artifacts/*/; do
            abi_name="$(basename "$abi_dir" | sed 's/^ffmpeg-//')"
            mkdir -p "app/src/main/jniLibs/${abi_name}"
            cp "${abi_dir}ffmpeg" "app/src/main/jniLibs/${abi_name}/libffmpeg.so"
            chmod +x "app/src/main/jniLibs/${abi_name}/libffmpeg.so"
          done
          find app/src/main/jniLibs -type f

      # The Play Billing implementation lives in src/play and is not compiled
      # by assembleDirectDebug. Compile it on every Android change so Billing
      # API mistakes fail here instead of during the next signed AAB release.
      - name: Build Direct debug APK and compile Play Billing flavor
        run: gradle :app:assembleDirectDebug :app:compilePlayDebugKotlin --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: classydl-debug-apk
          path: android/app/build/outputs/apk/direct/debug/app-direct-debug.apk
          retention-days: 7

  emulator-smoke-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          persist-credentials: false

      - name: Download APK artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: classydl-debug-apk
          path: apk

      - name: Download x86_64 ffmpeg binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ffmpeg-x86_64
          path: ffmpeg-x86_64

      - name: Enable KVM for hardware-accelerated emulation
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install app in emulator, smoke-test /api/health and ffmpeg
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r apk/app-direct-debug.apk
            adb shell am start -n de.classydl.app/.MainActivity
            adb forward tcp:8420 tcp:8420
            bash ${{ github.workspace }}/.github/scripts/smoke_test.sh
            bash ${{ github.workspace }}/.github/scripts/ffmpeg_exec_test.sh ${{ github.workspace }}/ffmpeg-x86_64/ffmpeg
            bash ${{ github.workspace }}/.github/scripts/download_pipeline_test.sh
            bash ${{ github.workspace }}/.github/scripts/share_intent_test.sh
            bash ${{ github.workspace }}/.github/scripts/background_survival_test.sh
            bash ${{ github.workspace }}/.github/scripts/kill_resilience_test.sh
