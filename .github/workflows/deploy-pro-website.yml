name: Deploy Pro website to Cloudflare Pages

# Pushes to master deploy the public site. Affiliate registration is enabled only
# when all required non-payment secrets are present. Checkout remains explicitly
# disabled until the owner changes AFFILIATE_CHECKOUT_ENABLED in a separate step.
on:
  push:
    branches: ["claude/gothic-downloader-website-bp7r2u", "master"]
    paths:
      - "pro/website/**"
      - ".github/workflows/deploy-pro-website.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      PARTNER_FROM_EMAIL: ${{ secrets.PARTNER_FROM_EMAIL }}
      REFERRAL_HASH_SALT: ${{ secrets.REFERRAL_HASH_SALT }}
      AFFILIATE_ADMIN_EMAIL: ${{ secrets.AFFILIATE_ADMIN_EMAIL }}
      RETENTION_CLEANUP_TOKEN: ${{ secrets.RETENTION_CLEANUP_TOKEN }}
      ANDROID_CERT_SHA256: ${{ secrets.ANDROID_CERT_SHA256 }}
    steps:
      - uses: actions/checkout@v7

      - name: Require Cloudflare deployment credentials
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_API_TOKEN is missing"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "CLOUDFLARE_ACCOUNT_ID is missing"; exit 1; }

      - name: Ensure Cloudflare Pages project exists
        continue-on-error: true
        working-directory: pro/website
        run: npx -y wrangler@3 pages project create downloadthat --production-branch=master

      - name: Export D1 backup before affiliate migrations
        working-directory: pro/website
        run: npx -y wrangler@3 d1 export downloadthat-licenses --remote --output=../../downloadthat-licenses-before-affiliate.sql

      - name: Upload pre-migration D1 backup
        uses: actions/upload-artifact@v7
        with:
          name: downloadthat-licenses-before-affiliate-${{ github.run_id }}
          path: downloadthat-licenses-before-affiliate.sql
          if-no-files-found: error
          retention-days: 30

      - name: Apply tested D1 migrations
        working-directory: pro/website
        run: npx -y wrangler@3 d1 migrations apply downloadthat-licenses --remote

      - name: Set safe affiliate rollout flags
        working-directory: pro/website
        shell: bash
        run: |
          printf '%s' 'true' | npx -y wrangler@3 pages secret put AFFILIATE_PROGRAM_ENABLED --project-name=downloadthat
          printf '%s' 'true' | npx -y wrangler@3 pages secret put AFFILIATE_REGISTRATION_ENABLED --project-name=downloadthat
          printf '%s' 'false' | npx -y wrangler@3 pages secret put AFFILIATE_CHECKOUT_ENABLED --project-name=downloadthat
          printf '%s' 'production' | npx -y wrangler@3 pages secret put ENVIRONMENT --project-name=downloadthat
          printf '%s' 'https://downloadthat.gaistreich.com' | npx -y wrangler@3 pages secret put PUBLIC_BASE_URL --project-name=downloadthat

      - name: Set optional partner registration secrets
        if: ${{ env.TURNSTILE_SECRET_KEY != '' && env.TURNSTILE_SITE_KEY != '' && env.RESEND_API_KEY != '' && env.PARTNER_FROM_EMAIL != '' && env.REFERRAL_HASH_SALT != '' }}
        working-directory: pro/website
        shell: bash
        run: |
          printf '%s' "$TURNSTILE_SECRET_KEY" | npx -y wrangler@3 pages secret put TURNSTILE_SECRET_KEY --project-name=downloadthat
          printf '%s' "$TURNSTILE_SITE_KEY" | npx -y wrangler@3 pages secret put TURNSTILE_SITE_KEY --project-name=downloadthat
          printf '%s' "$RESEND_API_KEY" | npx -y wrangler@3 pages secret put RESEND_API_KEY --project-name=downloadthat
          printf '%s' "$PARTNER_FROM_EMAIL" | npx -y wrangler@3 pages secret put PARTNER_FROM_EMAIL --project-name=downloadthat
          printf '%s' "$REFERRAL_HASH_SALT" | npx -y wrangler@3 pages secret put REFERRAL_HASH_SALT --project-name=downloadthat

      - name: Report missing registration prerequisites
        if: ${{ env.TURNSTILE_SECRET_KEY == '' || env.TURNSTILE_SITE_KEY == '' || env.RESEND_API_KEY == '' || env.PARTNER_FROM_EMAIL == '' || env.REFERRAL_HASH_SALT == '' }}
        shell: bash
        run: |
          echo "::warning::Partner pages will be public, but registration remains fail-closed until TURNSTILE_SECRET_KEY, TURNSTILE_SITE_KEY, RESEND_API_KEY, PARTNER_FROM_EMAIL, and REFERRAL_HASH_SALT are configured as GitHub Actions secrets and this workflow is rerun."

      - name: Set optional affiliate administration and Android values
        if: ${{ env.AFFILIATE_ADMIN_EMAIL != '' || env.ANDROID_CERT_SHA256 != '' }}
        working-directory: pro/website
        shell: bash
        run: |
          if [ -n "$AFFILIATE_ADMIN_EMAIL" ]; then
            printf '%s' "$AFFILIATE_ADMIN_EMAIL" | npx -y wrangler@3 pages secret put AFFILIATE_ADMIN_EMAIL --project-name=downloadthat
          fi
          if [ -n "$ANDROID_CERT_SHA256" ]; then
            printf '%s' "$ANDROID_CERT_SHA256" | npx -y wrangler@3 pages secret put ANDROID_CERT_SHA256 --project-name=downloadthat
          fi

      - name: Set retention cleanup scheduler token
        if: ${{ env.RETENTION_CLEANUP_TOKEN != '' }}
        working-directory: pro/website
        shell: bash
        run: printf '%s' "$RETENTION_CLEANUP_TOKEN" | npx -y wrangler@3 pages secret put RETENTION_CLEANUP_TOKEN --project-name=downloadthat

      - name: Report missing retention cleanup scheduler token
        if: ${{ env.RETENTION_CLEANUP_TOKEN == '' }}
        shell: bash
        run: echo "::warning::Scheduled retention cleanup remains disabled until RETENTION_CLEANUP_TOKEN is configured as a GitHub Actions secret and this workflow is rerun."

      - name: Preserve existing Stripe configuration without enabling checkout
        if: ${{ env.STRIPE_SECRET_KEY != '' || env.STRIPE_WEBHOOK_SECRET != '' || env.STRIPE_PRICE_ID != '' }}
        working-directory: pro/website
        shell: bash
        run: |
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            printf '%s' "$STRIPE_SECRET_KEY" | npx -y wrangler@3 pages secret put STRIPE_SECRET_KEY --project-name=downloadthat
          fi
          if [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            printf '%s' "$STRIPE_WEBHOOK_SECRET" | npx -y wrangler@3 pages secret put STRIPE_WEBHOOK_SECRET --project-name=downloadthat
          fi
          if [ -n "$STRIPE_PRICE_ID" ]; then
            printf '%s' "$STRIPE_PRICE_ID" | npx -y wrangler@3 pages secret put STRIPE_PRICE_ID --project-name=downloadthat
          fi

      - name: Deploy static site and Functions to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: pro/website
          command: pages deploy . --project-name=downloadthat

      - name: Verify public registration mode and payment lock
        shell: bash
        run: |
          for attempt in 1 2 3 4 5 6; do
            response="$(curl --fail --silent --show-error https://downloadthat.pages.dev/api/partner/config || true)"
            if [ -n "$response" ]; then
              echo "$response"
              RESPONSE="$response" node -e '
                const config = JSON.parse(process.env.RESPONSE);
                if (config.checkout_enabled !== false) throw new Error("checkout must remain disabled");
                if (config.registration_enabled !== true) throw new Error("registration flag was not enabled");
              '
              exit 0
            fi
            sleep 10
          done
          echo "Public config endpoint did not become reachable" >&2
          exit 1
