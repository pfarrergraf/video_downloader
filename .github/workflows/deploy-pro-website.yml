name: Deploy Play-first website and entitlement backend

on:
  push:
    branches: ["master"]
    paths:
      - "pro/website/**"
      - ".github/workflows/deploy-pro-website.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: play-production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PLAY_DECOMMISSION_APPROVED: ${{ vars.PLAY_DECOMMISSION_APPROVED }}
      PLAY_STORE_URL: ${{ vars.PLAY_STORE_URL }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://downloadthat.app' }}
      CANONICAL_REDIRECT_ENABLED: ${{ vars.CANONICAL_REDIRECT_ENABLED || 'false' }}
      PLAY_BACKEND_CONFIGURED: ${{ vars.PLAY_BACKEND_CONFIGURED || 'false' }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_PRIVATE_KEY }}
      PLAY_TOKEN_ENCRYPTION_KEY: ${{ secrets.PLAY_TOKEN_ENCRYPTION_KEY }}
      PLAY_RTDN_AUDIENCE: ${{ secrets.PLAY_RTDN_AUDIENCE }}
      PLAY_RTDN_SERVICE_ACCOUNT_EMAIL: ${{ secrets.PLAY_RTDN_SERVICE_ACCOUNT_EMAIL }}
      PLAY_RECONCILIATION_SECRET: ${{ secrets.PLAY_RECONCILIATION_SECRET }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enforce public claims policy before deployment
        run: python scripts/check_public_claims.py
      - name: Require Cloudflare and optional Play configuration
        shell: bash
        run: |
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            test -n "${!name}" || { echo "$name is missing"; exit 1; }
          done
          if [ "$PLAY_BACKEND_CONFIGURED" = "true" ]; then
            test "$PLAY_DECOMMISSION_APPROVED" = "true" || { echo "Run the decommission preflight and set PLAY_DECOMMISSION_APPROVED=true"; exit 1; }
            for name in GOOGLE_PLAY_SERVICE_ACCOUNT_EMAIL GOOGLE_PLAY_SERVICE_ACCOUNT_PRIVATE_KEY PLAY_TOKEN_ENCRYPTION_KEY PLAY_RTDN_AUDIENCE PLAY_RTDN_SERVICE_ACCOUNT_EMAIL PLAY_RECONCILIATION_SECRET; do
              test -n "${!name}" || { echo "$name is missing"; exit 1; }
            done
          fi

      - name: Export D1 backup before migration
        working-directory: pro/website
        run: npx -y wrangler@3.114.15 d1 export downloadthat-licenses --remote --output=../../downloadthat-licenses-before-play.sql
      - name: Hash backup
        run: sha256sum downloadthat-licenses-before-play.sql > downloadthat-licenses-before-play.sql.sha256
      - name: Upload pre-migration evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: downloadthat-licenses-before-play-${{ github.run_id }}
          path: |
            downloadthat-licenses-before-play.sql
            downloadthat-licenses-before-play.sql.sha256
          retention-days: 90

      - name: Apply D1 migrations
        working-directory: pro/website
        run: npx -y wrangler@3.114.15 d1 migrations apply downloadthat-licenses --remote

      - name: Set public website runtime configuration
        working-directory: pro/website
        shell: bash
        run: |
          put() { printf '%s' "$2" | npx -y wrangler@3.114.15 pages secret put "$1" --project-name=downloadthat; }
          put PUBLIC_BASE_URL "$PUBLIC_BASE_URL"
          put CANONICAL_REDIRECT_ENABLED "$CANONICAL_REDIRECT_ENABLED"
          put PLAY_BACKEND_CONFIGURED "$PLAY_BACKEND_CONFIGURED"
          put PLAY_PACKAGE_NAME "de.classydl.app"
          put PLAY_PRODUCT_ID "pro"
          if [ -n "$PLAY_STORE_URL" ]; then
            put PLAY_STORE_URL "$PLAY_STORE_URL"
          fi

      - name: Set Google Play backend secrets
        if: env.PLAY_BACKEND_CONFIGURED == 'true'
        working-directory: pro/website
        shell: bash
        run: |
          put() { printf '%s' "$2" | npx -y wrangler@3.114.15 pages secret put "$1" --project-name=downloadthat; }
          put GOOGLE_PLAY_SERVICE_ACCOUNT_EMAIL "$GOOGLE_PLAY_SERVICE_ACCOUNT_EMAIL"
          put GOOGLE_PLAY_SERVICE_ACCOUNT_PRIVATE_KEY "$GOOGLE_PLAY_SERVICE_ACCOUNT_PRIVATE_KEY"
          put PLAY_TOKEN_ENCRYPTION_KEY "$PLAY_TOKEN_ENCRYPTION_KEY"
          put PLAY_RTDN_AUDIENCE "$PLAY_RTDN_AUDIENCE"
          put PLAY_RTDN_SERVICE_ACCOUNT_EMAIL "$PLAY_RTDN_SERVICE_ACCOUNT_EMAIL"
          put PLAY_RECONCILIATION_SECRET "$PLAY_RECONCILIATION_SECRET"
          if [ -n "$PLAY_STORE_URL" ]; then
            put PLAY_STORE_URL "$PLAY_STORE_URL"
          fi

      - name: Deploy static site and Functions
        id: pages-deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: pro/website
          command: pages deploy . --project-name=downloadthat

      - name: Replace legacy Hello World route and attach production domains
        shell: bash
        run: |
          auth=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json")
          domains_url="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/downloadthat/domains"
          for domain in downloadthat.app www.downloadthat.app; do
            domains_json=$(curl --fail --silent --show-error "$domains_url" "${auth[@]}") || {
              echo "::warning::Could not list Pages custom domains; attach $domain in the Cloudflare dashboard."
              continue
            }
            if ! jq -e --arg domain "$domain" '.result[] | select(.name == $domain)' <<<"$domains_json" >/dev/null; then
              curl --fail --silent --show-error -X POST "$domains_url" "${auth[@]}" --data "{\"name\":\"$domain\"}" >/dev/null ||
                echo "::warning::Could not attach $domain automatically; attach it in the Cloudflare dashboard."
            fi
          done

          zone_json=$(curl --fail --silent --show-error "https://api.cloudflare.com/client/v4/zones?name=downloadthat.app" "${auth[@]}") || {
            echo "::warning::Token cannot inspect the downloadthat.app zone; remove the legacy Hello World Worker route in the dashboard."
            exit 0
          }
          zone_id=$(jq -r '.result[0].id // empty' <<<"$zone_json")
          [ -n "$zone_id" ] || exit 0
          routes_json=$(curl --fail --silent --show-error "https://api.cloudflare.com/client/v4/zones/$zone_id/workers/routes" "${auth[@]}") || {
            echo "::warning::Token cannot list Worker routes; remove the legacy Hello World route in the dashboard."
            exit 0
          }
          jq -r '.result[] | select(.pattern == "downloadthat.app/*" or .pattern == "www.downloadthat.app/*") | .id' <<<"$routes_json" |
            while read -r route_id; do
              [ -n "$route_id" ] || continue
              curl --fail --silent --show-error -X DELETE "https://api.cloudflare.com/client/v4/zones/$zone_id/workers/routes/$route_id" "${auth[@]}" >/dev/null ||
                echo "::warning::Could not remove legacy Worker route $route_id; remove it in the dashboard."
            done

      - name: Verify Play-first deployment
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.pages-deploy.outputs.deployment-url }}
        run: |
          test -n "$DEPLOYMENT_URL" || { echo "Cloudflare deployment URL is missing"; exit 1; }
          base_url="${DEPLOYMENT_URL%/}"
          curl --fail --location --retry 5 --retry-all-errors "$base_url/download" >/dev/null
          curl --fail --retry 5 --retry-all-errors "$base_url/api/health" | tee health.json
          node -e 'const h=require("./health.json"); if(!h.ok) process.exit(1)'
          test "$(curl -s -o /dev/null -w '%{http_code}' "$base_url/api/create-checkout")" = "404"
          test "$(curl -s -o /dev/null -w '%{http_code}' "$base_url/api/partner/config")" = "404"
