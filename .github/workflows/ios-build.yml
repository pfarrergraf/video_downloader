name: iOS build

on:
  push:
    branches:
      - iPhone
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS simulator app
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/DownloadThatIOS/DownloadThatIOS.xcodeproj \
            -scheme DownloadThatIOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Boot Simulator and launch the app
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Debug-iphonesimulator/DownloadThatIOS.app"
          BUNDLE_ID=$(xcodebuild -showBuildSettings \
            -project ios/DownloadThatIOS/DownloadThatIOS.xcodeproj \
            -scheme DownloadThatIOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            | awk -F ' = ' '/PRODUCT_BUNDLE_IDENTIFIER/ {print $2; exit}')
          echo "Bundle ID: ${BUNDLE_ID}"
          bash .github/scripts/ios_simulator_smoke_test.sh "$APP_PATH" "$BUNDLE_ID"
